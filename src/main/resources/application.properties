# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080
server.servlet.context-path=/api

# ========================
# DATABASE CONFIGURATION
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/thesis_management?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# ========================
# SQL INITIALIZATION
# ========================
spring.sql.init.mode=always

# ========================
# JWT CONFIGURATION
# ========================
app.jwt.secret=ThesisManagementSecretKeyForJWTTokenGeneration2024VeryLongAndSecure
app.jwt.expiration-ms=86400000

# ========================
# LOGGING
# ========================
logging.level.com.university.thesis=DEBUG
logging.level.org.springframework.security=DEBUG
