# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080
server.servlet.context-path=/api

# ========================
# DATABASE CONFIGURATION
# ========================
# ??m b?o tên database trong MySQL c?a ông là: thesis_management
spring.datasource.url=jdbc:mysql://localhost:3306/thesis_management?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
# N?U MYSQL CÓ M?T KH?U TH̀ ?I?N VÀO ?ÂY, KHÔNG TH̀ ?? TR?NG
spring.datasource.password=08012005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# ========================
# SQL INITIALIZATION
# ========================
spring.sql.init.mode=always

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# JWT CONFIGURATION
# ========================
app.jwt.secret=ThesisManagementSecretKeyForJWTTokenGeneration2024VeryLongAndSecure
app.jwt.expiration-ms=86400000

# ========================
# ERROR HANDLING
# ========================
server.error.include-message=always
server.error.include-binding-errors=always

# ========================
# LOGGING
# ========================
logging.level.com.university.thesis=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN